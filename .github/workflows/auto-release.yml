name: Auto-release on CHANGELOG version bump

# Fires on every push to main (PR merges + direct pushes).
# Detects whether the top CHANGELOG entry has been tagged yet; if not, runs the
# release ceremony (tag, push, gh release with notes lifted from CHANGELOG.md).
# Idempotent — no-ops when the top CHANGELOG version is already tagged.

on:
  push:
    branches: [main]
  workflow_dispatch: {}  # manual re-run for failure recovery

concurrency:
  group: auto-release
  cancel-in-progress: false  # never cancel a release mid-flight

permissions:
  contents: write   # push commits + tags + create releases
  issues: write     # open issue on failure

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Detect top CHANGELOG version
        id: changelog
        # Regex requires the version to be followed by space or end-of-line so
        # pre-release headings like "## v1.65.0-rc.1 (...)" do NOT match.
        run: |
          version=$(grep -oE '^## v[0-9]+\.[0-9]+\.[0-9]+($| )' CHANGELOG.md | head -1 | sed -E 's/^## //;s/[[:space:]]+$//')
          if [ -z "$version" ]; then
            echo "::warning::No final-release '## vX.Y.Z' heading found at top of CHANGELOG.md"
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "Detected top CHANGELOG version: $version"
          fi

      - name: Check whether tag already exists
        id: tag_check
        if: steps.changelog.outputs.version != ''
        env:
          VERSION: ${{ steps.changelog.outputs.version }}
        run: |
          if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag ${VERSION} already exists — release work complete, no-op"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${VERSION} missing — proceeding with release ceremony"
          fi

      - name: Skip when no release needed
        if: steps.changelog.outputs.version == '' || steps.tag_check.outputs.needed != 'true'
        run: echo "Nothing to do — exiting cleanly"

      - name: Tag locally
        if: steps.tag_check.outputs.needed == 'true'
        env:
          VERSION: ${{ steps.changelog.outputs.version }}
        run: git tag "${VERSION}"

      - name: Push tag
        if: steps.tag_check.outputs.needed == 'true'
        env:
          VERSION: ${{ steps.changelog.outputs.version }}
        run: git push origin "${VERSION}"

      - name: Extract release notes from CHANGELOG
        if: steps.tag_check.outputs.needed == 'true'
        env:
          VERSION: ${{ steps.changelog.outputs.version }}
        # Awk with state flag avoids the sed/awk range bug where start-line
        # ALSO matches the end pattern and the range collapses to one line.
        run: |
          awk -v v="$VERSION" '
            in_section && /^## v[0-9]+\.[0-9]+\.[0-9]+/ { exit }
            $0 ~ "^## " v "($| )" { in_section=1 }
            in_section { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          echo "--- release notes preview ---"
          head -20 /tmp/release-notes.md
          echo "--- end preview ---"

      - name: Create GitHub release
        if: steps.tag_check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.changelog.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file /tmp/release-notes.md

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.changelog.outputs.version }}
        with:
          script: |
            const version = process.env.VERSION || 'unknown';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-release ${version} failed — manual intervention needed`,
              body: [
                `The auto-release workflow failed at commit \`${context.sha}\`.`,
                ``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `**Recovery options:**`,
                `1. Fix the underlying cause, push a follow-up commit — workflow re-runs on push to main`,
                `2. Or trigger \`workflow_dispatch\` from the Actions UI once the cause is fixed`,
                `3. Or complete the release manually (see \`directives/kit-development.md\` → Manual fallback)`,
                ``,
                `Re-runs are idempotent: completed steps (existing tag, existing release) are detected and skipped.`,
              ].join('\n'),
              labels: ['release-automation', 'needs-triage']
            });
