name: DOE Proof

# Re-runs the gate-efficacy benchmark as a regression gate. Runs on EVERY
# push to main and EVERY PR (v1.71.0): the corpus exercises the real
# guardrail hooks, so a hook regression anywhere in the kit must turn this
# red. The old proof/**-only path scoping meant a hook change could ship
# without the proof job ever running — the exact silent-death class
# (guard_kit_writes, v1.51–v1.58) the harness exists to catch.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Schema — examples validate
        run: python3 proof/schema/validate.py proof/schema/examples/
      - name: Corpus — integrity
        run: python3 proof/corpus_check.py
      - name: Gate efficacy — self-test (every covered fault caught, control clean)
        run: python3 proof/run.py --self-test
      - name: Metrics — self-test (CFR/rework proxy, no cost invented)
        run: python3 proof/metrics.py --self-test
