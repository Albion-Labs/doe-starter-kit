name: DOE CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  LIGHTHOUSE_PERF_THRESHOLD: "80"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Detection: identify stack AND what files changed
  # ──────────────────────────────────────────────────────────────
  detect:
    name: Detect
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.stack.outputs.has_node }}
      has_python: ${{ steps.stack.outputs.has_python }}
      has_go: ${{ steps.stack.outputs.has_go }}
      has_flutter: ${{ steps.stack.outputs.has_flutter }}
      has_rust: ${{ steps.stack.outputs.has_rust }}
      has_eslint: ${{ steps.stack.outputs.has_eslint }}
      has_playwright: ${{ steps.stack.outputs.has_playwright }}
      has_pytest: ${{ steps.stack.outputs.has_pytest }}
      has_ruff: ${{ steps.stack.outputs.has_ruff }}
      has_web: ${{ steps.stack.outputs.has_web }}
      has_npm_test: ${{ steps.stack.outputs.has_npm_test }}
      code_changed: ${{ steps.changes.outputs.code }}
      python_changed: ${{ steps.changes.outputs.python }}
      go_changed: ${{ steps.changes.outputs.go }}
      flutter_changed: ${{ steps.changes.outputs.flutter }}
      rust_changed: ${{ steps.changes.outputs.rust }}
      web_changed: ${{ steps.changes.outputs.web }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # What files changed in this PR?
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: changes
        with:
          filters: |
            code:
              - 'src/**'
              - 'app/**'
              - 'pages/**'
              - 'components/**'
              - 'lib/**'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.jsx'
              - '**/*.tsx'
              - '**/*.mjs'
              - '**/*.cjs'
              - 'package.json'
              - 'package-lock.json'
              - '.eslintrc*'
              - 'eslint.config.*'
              - 'playwright.config.*'
            python:
              - '**/*.py'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'setup.py'
              - 'setup.cfg'
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            flutter:
              - '**/*.dart'
              - 'pubspec.yaml'
              - 'pubspec.lock'
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
            web:
              - '**/*.html'
              - '**/*.css'
              - '**/*.scss'
              - 'public/**'

      # What stack is in this repo?
      - id: stack
        run: |
          [ -f package.json ] && echo "has_node=true" >> "$GITHUB_OUTPUT" || echo "has_node=false" >> "$GITHUB_OUTPUT"
          ([ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f setup.py ]) && echo "has_python=true" >> "$GITHUB_OUTPUT" || echo "has_python=false" >> "$GITHUB_OUTPUT"
          [ -f go.mod ] && echo "has_go=true" >> "$GITHUB_OUTPUT" || echo "has_go=false" >> "$GITHUB_OUTPUT"
          [ -f pubspec.yaml ] && echo "has_flutter=true" >> "$GITHUB_OUTPUT" || echo "has_flutter=false" >> "$GITHUB_OUTPUT"
          [ -f Cargo.toml ] && echo "has_rust=true" >> "$GITHUB_OUTPUT" || echo "has_rust=false" >> "$GITHUB_OUTPUT"
          ([ -f .eslintrc.js ] || [ -f .eslintrc.json ] || [ -f .eslintrc.yml ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f eslint.config.ts ]) && echo "has_eslint=true" >> "$GITHUB_OUTPUT" || echo "has_eslint=false" >> "$GITHUB_OUTPUT"
          ([ -f playwright.config.ts ] || [ -f playwright.config.js ]) && echo "has_playwright=true" >> "$GITHUB_OUTPUT" || echo "has_playwright=false" >> "$GITHUB_OUTPUT"
          (grep -q "pytest" requirements.txt 2>/dev/null || grep -q "pytest" pyproject.toml 2>/dev/null) && echo "has_pytest=true" >> "$GITHUB_OUTPUT" || echo "has_pytest=false" >> "$GITHUB_OUTPUT"
          (grep -q "ruff" requirements.txt 2>/dev/null || grep -q "ruff" pyproject.toml 2>/dev/null) && echo "has_ruff=true" >> "$GITHUB_OUTPUT" || echo "has_ruff=false" >> "$GITHUB_OUTPUT"
          ([ -f next.config.ts ] || [ -f next.config.js ] || [ -f next.config.mjs ] || [ -f vite.config.ts ] || [ -f vite.config.js ] || find . -maxdepth 3 -name "*.html" -not -path "./.git/*" 2>/dev/null | grep -q .) && echo "has_web=true" >> "$GITHUB_OUTPUT" || echo "has_web=false" >> "$GITHUB_OUTPUT"
          if [ -f package.json ] && jq -e '.scripts.test // empty | select(. != "echo \"Error: no test specified\" && exit 1")' package.json >/dev/null 2>&1; then
            echo "has_npm_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm_test=false" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────
  # Gates tier: blocking checks (must pass to merge)
  # ──────────────────────────────────────────────────────────────
  gates:
    name: Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Health Check
        run: |
          if [ -f execution/health_check.py ]; then
            python3 execution/health_check.py --ci
          else
            echo "No health_check.py found -- skipping"
          fi

      - name: Claim Audit
        run: |
          if [ -f execution/audit_claims.py ]; then
            python3 execution/audit_claims.py --hook --json
          else
            echo "No audit_claims.py found -- skipping"
          fi

      - name: Methodology Tests (test_methodology)
        run: |
          if [ -f execution/test_methodology.py ]; then
            python3 execution/test_methodology.py --quick
          else
            echo "No test_methodology.py found -- skipping"
          fi

      - name: Secret pattern scan
        run: |
          echo "Scanning for secret patterns..."
          PATTERNS='(PRIVATE.KEY|SECRET_KEY|API_KEY|PASSWORD|TOKEN|Bearer\s+[A-Za-z0-9\-._~+/]+|-----BEGIN\s+(RSA|EC|OPENSSH)\s+PRIVATE\s+KEY-----)'
          # Scan tracked files only (exclude .env*, lock files, binaries)
          MATCHES=$(git diff --cached --diff-filter=d -U0 HEAD 2>/dev/null | grep -iP "$PATTERNS" || true)
          if [ -z "$MATCHES" ]; then
            # Also scan working tree for new repos with no commits yet
            MATCHES=$(grep -riP "$PATTERNS" --include='*.py' --include='*.js' --include='*.ts' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.sh' --include='*.env.example' . 2>/dev/null \
              | grep -v 'node_modules/' | grep -v '.git/' | grep -v 'package-lock.json' | grep -v '.env.example' \
              | grep -v '# v[0-9]' | grep -v 'secret pattern scan' | grep -v 'PATTERNS=' | grep -v 'SECRET_KEY' | head -20 || true)
          fi
          if [ -n "$MATCHES" ]; then
            echo "::warning::Potential secret patterns detected -- review before merge:"
            echo "$MATCHES" | head -20
            echo "If these are false positives, add them to .secretignore"
          else
            echo "No secret patterns detected"
          fi

      - name: npm audit (if Node project)
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
            npm audit --audit-level=critical || echo "::warning::npm audit found critical vulnerabilities"
          else
            echo "No package-lock.json -- skipping npm audit"
          fi

      - name: pip-audit (if Python project)
        run: |
          if [ -f requirements.txt ]; then
            pip install pip-audit
            pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities"
          elif [ -f pyproject.toml ]; then
            pip install pip-audit
            pip-audit || echo "::warning::pip-audit found vulnerabilities"
          else
            echo "No Python dependencies file -- skipping pip-audit"
          fi

  eslint:
    name: ESLint
    needs: detect
    if: needs.detect.outputs.has_eslint == 'true' && needs.detect.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint .

  node-test:
    name: Node.js Tests
    needs: detect
    if: needs.detect.outputs.has_npm_test == 'true' && needs.detect.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  python-test:
    name: Python Tests
    needs: detect
    if: needs.detect.outputs.has_pytest == 'true' && needs.detect.outputs.python_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt || pip install -e ".[test]" || echo "No install file found -- running pytest with current environment"
      - run: python -m pytest

  python-lint:
    name: Python Lint
    needs: detect
    if: needs.detect.outputs.has_ruff == 'true' && needs.detect.outputs.python_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  go-test:
    name: Go Tests
    needs: detect
    if: needs.detect.outputs.has_go == 'true' && needs.detect.outputs.go_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go test ./...

  flutter-test:
    name: Flutter Tests
    needs: detect
    if: needs.detect.outputs.has_flutter == 'true' && needs.detect.outputs.flutter_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  rust-test:
    name: Rust Tests
    needs: detect
    if: needs.detect.outputs.has_rust == 'true' && needs.detect.outputs.rust_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # ──────────────────────────────────────────────────────────────
  # Advisory tier: informational, never blocks merge
  # ──────────────────────────────────────────────────────────────
  advisory:
    name: Advisory
    needs: detect
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Lighthouse (threshold ${{ env.LIGHTHOUSE_PERF_THRESHOLD }})
        id: lighthouse
        if: needs.detect.outputs.has_web == 'true' && needs.detect.outputs.web_changed == 'true'
        run: |
          THRESHOLD="${LIGHTHOUSE_PERF_THRESHOLD:-80}"
          echo "Performance threshold: $THRESHOLD"
          if [ -f execution/lighthouse.sh ]; then
            bash execution/lighthouse.sh
            if [ -f .tmp/lighthouse.json ]; then
              SCORE=$(jq '.categories.performance.score // 0' .tmp/lighthouse.json 2>/dev/null | awk '{printf "%.0f", $1 * 100}')
              echo "lighthouse_score=$SCORE" >> "$GITHUB_OUTPUT"
              if [ "$SCORE" -lt "$THRESHOLD" ]; then
                echo "::warning::Lighthouse performance score $SCORE is below threshold $THRESHOLD"
                echo "lighthouse_pass=false" >> "$GITHUB_OUTPUT"
              else
                echo "Lighthouse performance score $SCORE meets threshold $THRESHOLD"
                echo "lighthouse_pass=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          else
            echo "No Lighthouse script found -- skipping"
            echo "lighthouse_score=N/A" >> "$GITHUB_OUTPUT"
            echo "lighthouse_pass=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Playwright
        id: playwright
        if: needs.detect.outputs.has_playwright == 'true' && needs.detect.outputs.code_changed == 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          fi
          npx playwright install chromium --with-deps
          npx playwright test 2>&1 | tee .tmp/playwright-output.txt || true
          if grep -q "passed" .tmp/playwright-output.txt 2>/dev/null; then
            echo "playwright_result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "playwright_result=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: needs.detect.outputs.has_playwright == 'true' && needs.detect.outputs.code_changed == 'true'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: needs.detect.outputs.has_web == 'true' && needs.detect.outputs.web_changed == 'true'
        with:
          name: lighthouse-report
          path: .tmp/lighthouse.json
          retention-days: 14

      - name: Post advisory PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const lhScore = '${{ steps.lighthouse.outputs.lighthouse_score }}' || 'N/A';
            const lhPass = '${{ steps.lighthouse.outputs.lighthouse_pass }}' || 'skipped';
            const pwResult = '${{ steps.playwright.outputs.playwright_result }}' || 'skipped';
            const threshold = process.env.LIGHTHOUSE_PERF_THRESHOLD || '80';

            const lhIcon = lhPass === 'true' ? ':white_check_mark:' : lhPass === 'false' ? ':warning:' : ':skip_forward:';
            const pwIcon = pwResult === 'passed' ? ':white_check_mark:' : pwResult === 'failed' ? ':warning:' : ':skip_forward:';

            const body = [
              '## Advisory CI Results',
              '',
              '> These checks are **informational only** and do not block merge.',
              '',
              `| Check | Result | Details |`,
              `|-------|--------|---------|`,
              `| ${lhIcon} Lighthouse | Score: ${lhScore} | Threshold: ${threshold} |`,
              `| ${pwIcon} Playwright | ${pwResult} | E2E tests |`,
              '',
              '_Posted by DOE CI advisory tier_'
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Advisory CI Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ──────────────────────────────────────────────────────────────
  # CI Result: single aggregator (the ONLY required check)
  # ──────────────────────────────────────────────────────────────
  ci-result:
    name: CI Result
    if: always()
    needs: [gates, eslint, node-test, python-test, python-lint, go-test, flutter-test, rust-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        env:
          GATES: ${{ needs.gates.result }}
          ESLINT: ${{ needs.eslint.result }}
          NODE_TEST: ${{ needs.node-test.result }}
          PYTHON_TEST: ${{ needs.python-test.result }}
          PYTHON_LINT: ${{ needs.python-lint.result }}
          GO_TEST: ${{ needs.go-test.result }}
          FLUTTER_TEST: ${{ needs.flutter-test.result }}
          RUST_TEST: ${{ needs.rust-test.result }}
        run: |
          echo "=== CI Results ==="
          echo "Gates:        $GATES"
          echo "ESLint:       $ESLINT"
          echo "Node Tests:   $NODE_TEST"
          echo "Python Tests: $PYTHON_TEST"
          echo "Python Lint:  $PYTHON_LINT"
          echo "Go Tests:     $GO_TEST"
          echo "Flutter:      $FLUTTER_TEST"
          echo "Rust:         $RUST_TEST"
          echo "================="

          failed=false

          # Gates must pass (universal, always runs)
          if [ "$GATES" != "success" ]; then
            echo "::error::DOE Gates failed"
            failed=true
          fi

          # Project tier: failure or cancelled blocks, skipped is fine
          for check in "$ESLINT" "$NODE_TEST" "$PYTHON_TEST" "$PYTHON_LINT" "$GO_TEST" "$FLUTTER_TEST" "$RUST_TEST"; do
            if [ "$check" = "failure" ] || [ "$check" = "cancelled" ]; then
              echo "::error::A project check failed or was cancelled"
              failed=true
            fi
          done

          # Advisory tier (advisory job) not checked here -- never blocks

          if [ "$failed" = "true" ]; then
            exit 1
          fi

          echo "All checks passed"
