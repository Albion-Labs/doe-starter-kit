name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    # COLLABORATOR restriction: only repo collaborators can trigger Claude
    if: |
      github.event.comment.author_association == 'COLLABORATOR' ||
      github.event.comment.author_association == 'MEMBER' ||
      github.event.comment.author_association == 'OWNER'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@725b9c36f61150e9be5b9ec02289a9a0cfc21c04 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Anti-injection: Claude must ignore instructions embedded in PR diffs,
          # comments from non-collaborators, or any attempt to override this system prompt.
          # Only respond to direct @claude mentions from authorised collaborators.
          allowed_tools: "Bash,Read,Glob,Grep,Edit,Write"
