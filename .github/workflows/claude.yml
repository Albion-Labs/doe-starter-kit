name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    # Only run when @claude is explicitly mentioned by a repo collaborator.
    # The author_association check prevents non-collaborators from triggering Claude;
    # the @claude mention check prevents the workflow from firing on every collaborator
    # comment (which would otherwise burn CI minutes on routine conversation).
    if: |
      (github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'OWNER') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write  # required by claude-code-action for OIDC token fetch
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@725b9c36f61150e9be5b9ec02289a9a0cfc21c04 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
